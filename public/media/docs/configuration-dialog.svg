<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
  </defs>

  <!-- Backdrop blur overlay -->
  <rect width="680" height="520" fill="url(#bg2)" opacity="0.6" />

  <!-- Dialog box -->
  <rect x="80" y="40" width="520" height="440" rx="12" fill="#0f2035" stroke="#1e3a5f" stroke-width="1.5" />

  <!-- Dialog header -->
  <rect x="80" y="40" width="520" height="52" rx="12" fill="#0a1628" />
  <rect x="80" y="78" width="520" height="14" fill="#0a1628" />
  <text x="340" y="72" fill="#ccd6f6" font-size="15" font-family="Arial" font-weight="bold" text-anchor="middle">Configuration</text>
  <!-- Close button -->
  <circle cx="576" cy="66" r="12" fill="#1a2a3a" />
  <text x="576" y="70" fill="#8899aa" font-size="13" font-family="Arial" text-anchor="middle">✕</text>

  <!-- Tabs -->
  <rect x="80" y="92" width="520" height="36" fill="#0a1628" />
  <rect x="92" y="98" width="100" height="24" rx="6" fill="#0f3460" />
  <text x="142" y="115" fill="#4f8ef7" font-size="11" font-family="Arial" text-anchor="middle">Profile</text>
  <text x="264" y="115" fill="#6a7a8a" font-size="11" font-family="Arial" text-anchor="middle">Job Context</text>
  <text x="390" y="115" fill="#6a7a8a" font-size="11" font-family="Arial" text-anchor="middle">Face Photo</text>
  <rect x="80" y="128" width="520" height="1" fill="#1e3a5f" />

  <!-- Name field -->
  <text x="108" y="158" fill="#8a9ab0" font-size="11" font-family="Arial">Full Name</text>
  <rect x="108" y="164" width="260" height="34" rx="6" fill="#0a1a2a" stroke="#2a4a6a" stroke-width="1" />
  <text x="122" y="186" fill="#ccd6f6" font-size="12" font-family="Arial">Alex Johnson</text>
  <!-- Emoji indicator -->
  <text x="320" y="186" fill="#28c840" font-size="14" font-family="Arial">✓</text>

  <!-- CV Field -->
  <text x="108" y="220" fill="#8a9ab0" font-size="11" font-family="Arial">CV / Profile Summary</text>
  <text x="220" y="220" fill="#4a5a6a" font-size="10" font-family="Arial">(Required — used to personalise AI responses)</text>
  <rect x="108" y="226" width="464" height="130" rx="6" fill="#0a1a2a" stroke="#2a4a6a" stroke-width="1" />
  <text x="122" y="248" fill="#c8d8e8" font-size="10" font-family="Arial">Senior Backend Engineer with 7 years of experience building</text>
  <text x="122" y="264" fill="#c8d8e8" font-size="10" font-family="Arial">distributed systems and microservices at scale. Proficient in</text>
  <text x="122" y="280" fill="#c8d8e8" font-size="10" font-family="Arial">Python, Go, Java, Kafka, Kubernetes, PostgreSQL, and AWS.</text>
  <text x="122" y="296" fill="#c8d8e8" font-size="10" font-family="Arial">Previously at DataFlow Corp (2021–present): led migration of</text>
  <text x="122" y="312" fill="#c8d8e8" font-size="10" font-family="Arial">legacy monolith to event-driven architecture serving 2M users,</text>
  <text x="122" y="328" fill="#c8d8e8" font-size="10" font-family="Arial">reduced P99 latency from 800ms to 120ms...</text>
  <!-- character count -->
  <text x="560" y="368" fill="#4a5a6a" font-size="10" font-family="Arial" text-anchor="end">1,247 / ∞ chars</text>

  <!-- Save button -->
  <rect x="108" y="430" width="130" height="34" rx="7" fill="#4f8ef7" />
  <text x="173" y="452" fill="white" font-size="12" font-family="Arial" font-weight="bold" text-anchor="middle">Save Changes</text>
  <!-- Cancel button -->
  <rect x="252" y="430" width="100" height="34" rx="7" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="302" y="452" fill="#aab4c6" font-size="12" font-family="Arial" text-anchor="middle">Cancel</text>

  <!-- Hint box -->
  <rect x="390" y="425" width="190" height="44" rx="6" fill="#0a2030" stroke="#1e3a5f" stroke-width="1" />
  <text x="485" y="443" fill="#4f8ef7" font-size="10" font-family="Arial" text-anchor="middle">💡 Detailed profiles produce</text>
  <text x="485" y="458" fill="#4f8ef7" font-size="10" font-family="Arial" text-anchor="middle">much more relevant answers</text>
</svg>
