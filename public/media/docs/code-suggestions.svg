<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2035" />
      <stop offset="100%" style="stop-color:#0a1628" />
    </linearGradient>
  </defs>

  <rect width="700" height="400" rx="10" fill="url(#bgC)" stroke="#1e3a5f" stroke-width="1.5" />

  <!-- Header -->
  <text x="20" y="28" fill="#28c840" font-size="13" font-family="Arial" font-weight="bold">Code Suggestion</text>
  <text x="530" y="28" fill="#4a5a6a" font-size="10" font-family="Arial">Ctrl+Shift+U/I to scroll</text>
  <rect x="0" y="36" width="700" height="1" fill="#1e3a5f" />

  <!-- Screenshot queue bar -->
  <rect x="12" y="44" width="676" height="30" rx="5" fill="#0a1628" stroke="#1e3450" stroke-width="1" />
  <text x="22" y="64" fill="#6a7a8a" font-size="10" font-family="Arial">Captured:</text>
  <!-- Screenshot thumbnails -->
  <rect x="86" y="48" width="36" height="22" rx="3" fill="#1e3450" stroke="#4f8ef7" stroke-width="1" />
  <text x="104" y="63" fill="#4f8ef7" font-size="9" font-family="Arial" text-anchor="middle">1</text>
  <rect x="128" y="48" width="36" height="22" rx="3" fill="#1e3450" stroke="#4f8ef7" stroke-width="1" />
  <text x="146" y="63" fill="#4f8ef7" font-size="9" font-family="Arial" text-anchor="middle">2</text>
  <rect x="170" y="48" width="36" height="22" rx="3" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" stroke-dasharray="4,2" />
  <text x="188" y="63" fill="#4a5a6a" font-size="9" font-family="Arial" text-anchor="middle">+</text>
  <!-- Capture / Submit / Clear buttons -->
  <rect x="500" y="48" width="60" height="22" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="530" y="63" fill="#aab4c6" font-size="9" font-family="Arial" text-anchor="middle">Capture</text>
  <rect x="568" y="48" width="58" height="22" rx="4" fill="#28c840" opacity="0.85" />
  <text x="597" y="63" fill="white" font-size="9" font-family="Arial" font-weight="bold" text-anchor="middle">Submit</text>
  <rect x="634" y="48" width="46" height="22" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="657" y="63" fill="#ff5a5a" font-size="9" font-family="Arial" text-anchor="middle">Clear</text>

  <!-- Code block -->
  <rect x="12" y="82" width="676" height="300" rx="6" fill="#060e1c" />
  <!-- Line numbers gutter -->
  <rect x="12" y="82" width="36" height="300" rx="6" fill="#080f1a" />
  <rect x="46" y="82" width="1" height="300" fill="#1a2a3a" />

  <!-- Line numbers -->
  <text x="30" y="104" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">1</text>
  <text x="30" y="120" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">2</text>
  <text x="30" y="136" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">3</text>
  <text x="30" y="152" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">4</text>
  <text x="30" y="168" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">5</text>
  <text x="30" y="184" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">6</text>
  <text x="30" y="200" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">7</text>
  <text x="30" y="216" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">8</text>
  <text x="30" y="232" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">9</text>
  <text x="30" y="248" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">10</text>
  <text x="30" y="264" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">11</text>
  <text x="30" y="280" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">12</text>
  <text x="30" y="296" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">13</text>
  <text x="30" y="312" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">14</text>
  <text x="30" y="328" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">15</text>
  <text x="30" y="344" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">16</text>
  <text x="30" y="360" fill="#2a4a6a" font-size="10" font-family="monospace" text-anchor="middle">17</text>

  <!-- Code -->
  <!-- Comment line -->
  <text x="56" y="104" fill="#4a7a6a" font-size="10" font-family="monospace"># Approach: Two-pointer sliding window — O(n) time, O(k) space</text>
  <text x="56" y="120" fill="#8ab4f8" font-size="10" font-family="monospace">from</text>
  <text x="90" y="120" fill="#c8d8e8" font-size="10" font-family="monospace">typing</text>
  <text x="130" y="120" fill="#8ab4f8" font-size="10" font-family="monospace">import</text>
  <text x="170" y="120" fill="#c8d8e8" font-size="10" font-family="monospace">List</text>

  <text x="56" y="136" fill="#c3e88d" font-size="10" font-family="monospace">def</text>
  <text x="80" y="136" fill="#82aaff" font-size="10" font-family="monospace">max_sum_subarray</text>
  <text x="216" y="136" fill="#c8d8e8" font-size="10" font-family="monospace">(nums: List[</text>
  <text x="304" y="136" fill="#f78c6c" font-size="10" font-family="monospace">int</text>
  <text x="328" y="136" fill="#c8d8e8" font-size="10" font-family="monospace">], k:</text>
  <text x="362" y="136" fill="#f78c6c" font-size="10" font-family="monospace">int</text>
  <text x="386" y="136" fill="#c8d8e8" font-size="10" font-family="monospace">) -&gt;</text>
  <text x="410" y="136" fill="#f78c6c" font-size="10" font-family="monospace">int</text>
  <text x="428" y="136" fill="#c8d8e8" font-size="10" font-family="monospace">:</text>

  <text x="66" y="152" fill="#ac7a3a" font-size="10" font-family="monospace">"""Return max sum of any contiguous subarray of length k."""</text>
  <text x="66" y="168" fill="#8ab4f8" font-size="10" font-family="monospace">if</text>
  <text x="84" y="168" fill="#c8d8e8" font-size="10" font-family="monospace">len(nums) &lt; k:</text>
  <text x="66" y="184" fill="#8ab4f8" font-size="10" font-family="monospace">    raise</text>
  <text x="108" y="184" fill="#f78c6c" font-size="10" font-family="monospace">ValueError</text>
  <text x="168" y="184" fill="#c8d8e8" font-size="10" font-family="monospace">(</text>
  <text x="174" y="184" fill="#c3e88d" font-size="10" font-family="monospace">"Array shorter than window"</text>
  <text x="316" y="184" fill="#c8d8e8" font-size="10" font-family="monospace">)</text>

  <text x="66" y="200" fill="#c8d8e8" font-size="10" font-family="monospace">window = </text>
  <text x="122" y="200" fill="#f78c6c" font-size="10" font-family="monospace">sum</text>
  <text x="146" y="200" fill="#c8d8e8" font-size="10" font-family="monospace">(nums[:k])</text>
  <text x="66" y="216" fill="#c8d8e8" font-size="10" font-family="monospace">best   = window</text>

  <text x="66" y="232" fill="#8ab4f8" font-size="10" font-family="monospace">for</text>
  <text x="90" y="232" fill="#c8d8e8" font-size="10" font-family="monospace">i</text>
  <text x="98" y="232" fill="#8ab4f8" font-size="10" font-family="monospace">in</text>
  <text x="116" y="232" fill="#f78c6c" font-size="10" font-family="monospace">range</text>
  <text x="150" y="232" fill="#c8d8e8" font-size="10" font-family="monospace">(k,</text>
  <text x="172" y="232" fill="#f78c6c" font-size="10" font-family="monospace">len</text>
  <text x="196" y="232" fill="#c8d8e8" font-size="10" font-family="monospace">(nums)):</text>
  <text x="76" y="248" fill="#c8d8e8" font-size="10" font-family="monospace">window += nums[i] - nums[i - k]</text>
  <text x="76" y="264" fill="#c8d8e8" font-size="10" font-family="monospace">best    =</text>
  <text x="134" y="264" fill="#f78c6c" font-size="10" font-family="monospace">max</text>
  <text x="158" y="264" fill="#c8d8e8" font-size="10" font-family="monospace">(best, window)</text>

  <text x="66" y="280" fill="#8ab4f8" font-size="10" font-family="monospace">return</text>
  <text x="106" y="280" fill="#c8d8e8" font-size="10" font-family="monospace">best</text>

  <!-- Streaming cursor -->
  <rect x="56" y="296" width="5" height="12" rx="1" fill="#28c840" opacity="0.8" />
</svg>
