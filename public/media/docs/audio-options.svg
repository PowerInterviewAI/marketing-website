<svg xmlns="http://www.w3.org/2000/svg" width="500" height="340" viewBox="0 0 500 340">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e" />
      <stop offset="100%" style="stop-color:#16213e" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ef7" />
      <stop offset="100%" style="stop-color:#7c5cfc" />
    </linearGradient>
  </defs>

  <rect width="500" height="340" fill="url(#bgA)" opacity="0.5" />

  <!-- Dialog box -->
  <rect x="60" y="30" width="380" height="280" rx="12" fill="#0f2035" stroke="#1e3a5f" stroke-width="1.5" />

  <!-- Header -->
  <rect x="60" y="30" width="380" height="48" rx="12" fill="#0a1628" />
  <rect x="60" y="63" width="380" height="15" fill="#0a1628" />
  <text x="93" y="60" fill="#4f8ef7" font-size="18" font-family="Arial">🎤</text>
  <text x="120" y="60" fill="#ccd6f6" font-size="14" font-family="Arial" font-weight="bold">Audio Options</text>
  <circle cx="420" cy="54" r="11" fill="#1a2a3a" />
  <text x="420" y="58" fill="#8899aa" font-size="12" font-family="Arial" text-anchor="middle">✕</text>
  <rect x="60" y="78" width="380" height="1" fill="#1e3a5f" />

  <!-- Microphone selector -->
  <text x="84" y="106" fill="#8a9ab0" font-size="11" font-family="Arial">Microphone (Your Voice)</text>
  <!-- Dropdown -->
  <rect x="84" y="112" width="312" height="36" rx="7" fill="#0a1a2a" stroke="#2a4a6a" stroke-width="1.5" />
  <!-- Arrow -->
  <text x="380" y="135" fill="#6a7a8a" font-size="12" font-family="Arial" text-anchor="middle">▾</text>
  <text x="100" y="135" fill="#ccd6f6" font-size="12" font-family="Arial">Headset Microphone (USB Headset)</text>

  <!-- Dropdown items visible below -->
  <rect x="84" y="148" width="312" height="90" rx="6" fill="#0a1a2a" stroke="#2a4a6a" stroke-width="1" />
  <rect x="84" y="148" width="312" height="28" rx="0" fill="#0f3460" />
  <text x="100" y="167" fill="#4f8ef7" font-size="11" font-family="Arial">✓  Headset Microphone (USB Headset)</text>
  <rect x="84" y="175" width="312" height="1" fill="#1e3450" />
  <text x="100" y="194" fill="#aab4c6" font-size="11" font-family="Arial">    Microphone Array (Intel SST)</text>
  <rect x="84" y="203" width="312" height="1" fill="#1e3450" />
  <text x="100" y="222" fill="#aab4c6" font-size="11" font-family="Arial">    Microphone (Realtek Audio)</text>

  <!-- Info box -->
  <rect x="84" y="248" width="312" height="44" rx="6" fill="#0a1e30" stroke="#1a4060" stroke-width="1" />
  <text x="100" y="266" fill="#7a9ab5" font-size="10" font-family="Arial">ℹ  Interviewer audio (loopback) is captured</text>
  <text x="100" y="281" fill="#7a9ab5" font-size="10" font-family="Arial">   automatically — no device selection needed.</text>

  <!-- Close button -->
  <rect x="315" y="298" width="115" height="30" rx="7" fill="url(#accent2)" />
  <text x="372" y="317" fill="white" font-size="11" font-family="Arial" font-weight="bold" text-anchor="middle">Confirm</text>
</svg>
