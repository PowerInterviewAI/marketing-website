<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0a2647;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c5cfc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Window background -->
  <rect width="900" height="560" rx="10" fill="url(#bg)" />

  <!-- Title bar -->
  <rect width="900" height="36" rx="10" fill="#0d1b2a" />
  <rect y="26" width="900" height="10" fill="#0d1b2a" />
  <circle cx="20" cy="18" r="6" fill="#ff5f57" />
  <circle cx="40" cy="18" r="6" fill="#febc2e" />
  <circle cx="60" cy="18" r="6" fill="#28c840" />
  <text x="450" y="23" fill="#8899aa" font-size="11" font-family="Arial" text-anchor="middle">Power Interview</text>

  <!-- Control Panel (top bar) -->
  <rect x="0" y="36" width="900" height="52" fill="#0d1b2a" />
  <!-- Profile dropdown -->
  <rect x="12" y="46" width="130" height="30" rx="6" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="77" y="65" fill="#ccd6f6" font-size="11" font-family="Arial" text-anchor="middle">👤 Alex Johnson</text>
  <!-- Mic button -->
  <rect x="158" y="46" width="38" height="30" rx="6" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="177" y="67" fill="#4f8ef7" font-size="16" font-family="Arial" text-anchor="middle">🎤</text>
  <!-- Face swap button -->
  <rect x="202" y="46" width="38" height="30" rx="6" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="221" y="67" fill="#7c5cfc" font-size="16" font-family="Arial" text-anchor="middle">🎭</text>
  <!-- START button -->
  <rect x="258" y="46" width="90" height="30" rx="6" fill="url(#accent)" />
  <text x="303" y="65" fill="white" font-size="12" font-family="Arial" font-weight="bold" text-anchor="middle">▶  START</text>
  <!-- Export / Clear -->
  <rect x="760" y="46" width="60" height="30" rx="6" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="790" y="65" fill="#aab4c6" font-size="11" font-family="Arial" text-anchor="middle">Export</text>
  <rect x="828" y="46" width="56" height="30" rx="6" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1" />
  <text x="856" y="65" fill="#aab4c6" font-size="11" font-family="Arial" text-anchor="middle">Clear</text>

  <!-- Separator -->
  <rect x="0" y="88" width="900" height="1" fill="#1e3450" />

  <!-- Transcript Panel -->
  <rect x="12" y="100" width="278" height="388" rx="8" fill="url(#panel)" stroke="#1e3a5f" stroke-width="1" />
  <text x="22" y="122" fill="#4f8ef7" font-size="11" font-family="Arial" font-weight="bold">Transcript</text>
  <rect x="12" y="128" width="278" height="1" fill="#1e3a5f" />
  <!-- Transcript lines -->
  <rect x="22" y="140" width="60" height="14" rx="3" fill="#2a4a6a" />
  <text x="22" y="152" fill="#5a8a6a" font-size="9" font-family="Arial">09:12 | You</text>
  <text x="22" y="167" fill="#c8d8e8" font-size="10" font-family="Arial">Tell me about your experience with</text>
  <text x="22" y="180" fill="#c8d8e8" font-size="10" font-family="Arial">distributed systems...</text>
  <rect x="22" y="192" width="80" height="14" rx="3" fill="#2a3a5a" />
  <text x="22" y="204" fill="#7a8aaa" font-size="9" font-family="Arial">09:13 | Interviewer</text>
  <text x="22" y="219" fill="#c8d8e8" font-size="10" font-family="Arial">Great. You mentioned Kafka — how</text>
  <text x="22" y="232" fill="#c8d8e8" font-size="10" font-family="Arial">did you handle consumer lag?</text>
  <rect x="22" y="244" width="60" height="14" rx="3" fill="#2a4a6a" />
  <text x="22" y="256" fill="#5a8a6a" font-size="9" font-family="Arial">09:14 | You</text>
  <text x="22" y="271" fill="#c8d8e8" font-size="10" font-family="Arial">We implemented a back-pressure</text>
  <text x="22" y="284" fill="#c8d8e8" font-size="10" font-family="Arial">mechanism with offset tracking...</text>
  <!-- Blinking cursor -->
  <rect x="22" y="296" width="6" height="12" rx="1" fill="#4f8ef7" opacity="0.8" />

  <!-- Reply Suggestions Panel -->
  <rect x="302" y="100" width="278" height="388" rx="8" fill="url(#panel)" stroke="#1e3a5f" stroke-width="1" />
  <text x="312" y="122" fill="#7c5cfc" font-size="11" font-family="Arial" font-weight="bold">AI Reply Suggestion</text>
  <rect x="302" y="128" width="278" height="1" fill="#1e3a5f" />
  <text x="312" y="148" fill="#c8d8e8" font-size="10" font-family="Arial">With Kafka, consumer lag can be a</text>
  <text x="312" y="163" fill="#c8d8e8" font-size="10" font-family="Arial">critical issue at scale. In my experience</text>
  <text x="312" y="178" fill="#c8d8e8" font-size="10" font-family="Arial">at DataFlow Corp, we tackled this by</text>
  <text x="312" y="193" fill="#c8d8e8" font-size="10" font-family="Arial">implementing a three-pronged strategy:</text>
  <text x="312" y="215" fill="#c8d8e8" font-size="10" font-family="Arial">1. Monitoring consumer group offsets</text>
  <text x="312" y="230" fill="#c8d8e8" font-size="10" font-family="Arial">   via Prometheus metrics</text>
  <text x="312" y="252" fill="#c8d8e8" font-size="10" font-family="Arial">2. Dynamic partition rebalancing</text>
  <text x="312" y="267" fill="#c8d8e8" font-size="10" font-family="Arial">   triggered by lag thresholds</text>
  <text x="312" y="289" fill="#c8d8e8" font-size="10" font-family="Arial">3. Dead letter queues for messages</text>
  <text x="312" y="304" fill="#c8d8e8" font-size="10" font-family="Arial">   that failed after 3 retries...</text>
  <!-- Streaming cursor -->
  <rect x="312" y="316" width="5" height="11" rx="1" fill="#7c5cfc" opacity="0.9" />

  <!-- Code / Video Panel -->
  <rect x="592" y="100" width="296" height="388" rx="8" fill="url(#panel)" stroke="#1e3a5f" stroke-width="1" />
  <text x="602" y="122" fill="#28c840" font-size="11" font-family="Arial" font-weight="bold">Code Suggestion</text>
  <!-- Credits badge -->
  <rect x="800" y="106" width="80" height="20" rx="10" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1"/>
  <text x="840" y="120" fill="#febc2e" font-size="10" font-family="Arial" text-anchor="middle">💳 120 cr</text>
  <rect x="592" y="128" width="296" height="1" fill="#1e3a5f" />
  <!-- Code block -->
  <rect x="602" y="138" width="276" height="200" rx="4" fill="#0a1628" />
  <text x="612" y="155" fill="#6a9fb5" font-size="9.5" font-family="monospace">def handle_consumer_lag(consumer):</text>
  <text x="622" y="170" fill="#ac7a3a" font-size="9.5" font-family="monospace">"""Monitor and resolve Kafka lag."""</text>
  <text x="622" y="185" fill="#c8d8e8" font-size="9.5" font-family="monospace">lag = consumer.get_lag_per_partition()</text>
  <text x="622" y="200" fill="#8ab4f8" font-size="9.5" font-family="monospace">if</text>
  <text x="645" y="200" fill="#c8d8e8" font-size="9.5" font-family="monospace">max(lag.values()) &gt; THRESHOLD:</text>
  <text x="632" y="215" fill="#c8d8e8" font-size="9.5" font-family="monospace">trigger_rebalance(consumer)</text>
  <text x="632" y="230" fill="#c8d8e8" font-size="9.5" font-family="monospace">adjust_fetch_sizes(consumer, lag)</text>
  <text x="622" y="248" fill="#8ab4f8" font-size="9.5" font-family="monospace">return</text>
  <text x="658" y="248" fill="#c8d8e8" font-size="9.5" font-family="monospace">ConsumerStatus(lag=lag)</text>
  <!-- Video feed preview -->
  <rect x="602" y="350" width="276" height="126" rx="4" fill="#0a1420" stroke="#1e3a5f" stroke-width="1" />
  <ellipse cx="740" cy="390" rx="35" ry="42" fill="#1a2a3a" />
  <ellipse cx="740" cy="375" rx="22" ry="22" fill="#2a3a4a" />
  <text x="740" y="438" fill="#4a6a8a" font-size="10" font-family="Arial" text-anchor="middle">OBS Virtual Camera</text>
  <rect x="840" y="356" width="32" height="18" rx="3" fill="#ff3a3a" opacity="0.8" />
  <text x="856" y="368" fill="white" font-size="8" font-family="Arial" text-anchor="middle">LIVE</text>

  <!-- Status bar -->
  <rect x="0" y="498" width="900" height="50" rx="0" fill="#0d1b2a" />
  <rect x="0" y="498" width="900" height="1" fill="#1e3450" />
  <!-- Status indicators -->
  <circle cx="28" cy="523" r="6" fill="#28c840" />
  <text x="42" y="527" fill="#aab4c6" font-size="10" font-family="Arial">Session running</text>
  <text x="200" y="527" fill="#aab4c6" font-size="10" font-family="Arial">|  🔒 Screen capture hidden</text>
  <text x="440" y="527" fill="#aab4c6" font-size="10" font-family="Arial">|  Ctrl+Shift+M — Stealth</text>
  <text x="680" y="527" fill="#febc2e" font-size="10" font-family="Arial">|  Credits: 120</text>

  <!-- Labels / Arrows -->
  <text x="150" y="500" fill="#4f8ef7" font-size="10" font-family="Arial" text-anchor="middle">Transcript</text>
  <text x="441" y="500" fill="#7c5cfc" font-size="10" font-family="Arial" text-anchor="middle">AI Suggestions</text>
  <text x="740" y="500" fill="#28c840" font-size="10" font-family="Arial" text-anchor="middle">Code + Camera</text>
</svg>
