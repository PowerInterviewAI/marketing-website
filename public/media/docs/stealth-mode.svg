<svg xmlns="http://www.w3.org/2000/svg" width="620" height="64" viewBox="0 0 620 64">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628" />
      <stop offset="100%" style="stop-color:#060e1c" />
    </linearGradient>
    <linearGradient id="accS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ef7" />
      <stop offset="100%" style="stop-color:#7c5cfc" />
    </linearGradient>
  </defs>

  <!-- Background + border -->
  <rect width="620" height="64" rx="10" fill="url(#sbg)" stroke="#1e3a5f" stroke-width="1.5" opacity="0.92" />

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="64" rx="2" fill="url(#accS)" />

  <!-- Status dot + label -->
  <circle cx="24" cy="32" r="5" fill="#28c840" />
  <text x="36" y="30" fill="#28c840" font-size="10" font-family="Arial" font-weight="bold">RUNNING</text>

  <!-- Dividers -->
  <rect x="105" y="14" width="1" height="36" fill="#1e3a5f" />

  <!-- Credits -->
  <text x="118" y="29" fill="#febc2e" font-size="10" font-family="Arial">💳</text>
  <text x="132" y="29" fill="#febc2e" font-size="10" font-family="Arial" font-weight="bold">120 credits</text>

  <!-- Divider -->
  <rect x="220" y="14" width="1" height="36" fill="#1e3a5f" />

  <!-- Stealth badge -->
  <rect x="232" y="19" width="74" height="22" rx="5" fill="#1a2a3a" stroke="#7c5cfc" stroke-width="1" />
  <text x="269" y="34" fill="#c084fc" font-size="10" font-family="Arial" text-anchor="middle">🔒 Stealth ON</text>

  <!-- Divider -->
  <rect x="316" y="14" width="1" height="36" fill="#1e3a5f" />

  <!-- Hotkeys reference -->
  <text x="328" y="26" fill="#6a7a8a" font-size="9" font-family="Arial">Ctrl+Shift+M → toggle stealth</text>
  <text x="328" y="40" fill="#6a7a8a" font-size="9" font-family="Arial">Ctrl+Shift+N → opacity</text>

  <rect x="490" y="14" width="1" height="36" fill="#1e3a5f" />

  <!-- Window position  -->
  <text x="504" y="26" fill="#6a7a8a" font-size="9" font-family="Arial">Ctrl+Shift+1–9</text>
  <text x="504" y="40" fill="#6a7a8a" font-size="9" font-family="Arial">position window</text>

  <!-- Pulsing recording icon -->
  <circle cx="600" cy="32" r="8" fill="#ff3a3a" opacity="0.85" />
  <circle cx="600" cy="32" r="5" fill="white" />
  <circle cx="600" cy="32" r="2" fill="#ff3a3a" />
</svg>
